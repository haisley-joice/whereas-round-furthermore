name: pronoun
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6517 }
          - { version: 7332 }
          - { version: 3597 }
          - { version: 2874 }
          - { version: 4942 }
          - { version: 9956 }
          - { version: 7219 }
          - { version: 8828 }
          - { version: 4492 }
          - { version: 3605 }
          - { version: 1451 }
          - { version: 9263 }
          - { version: 9275 }
          - { version: 1378 }
          - { version: 404 }
          - { version: 5096 }
          - { version: 2988 }
